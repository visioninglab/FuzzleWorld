<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="297mm" height="210mm" viewBox="0 0 297 210">
  <!-- FuzzleWorld — intro / cover page (A4 landscape). Logo © Giant Insect World. -->
  <style>
    .t{font-family:'Nunito ExtraBold',sans-serif;fill:#2e5d4e;}
    .h{font-family:'Nunito ExtraBold',sans-serif;fill:#2e5d4e;}
    .b{font-family:'Source Serif 4',serif;fill:#333;font-size:4px;}
    .s{font-family:'Source Serif 4',serif;fill:#666;font-size:3.4px;}
    .n{font-family:'Nunito ExtraBold',sans-serif;fill:#2e5d4e;font-size:5px;}
    .orange{fill:#e07b28;} .red{fill:#d22a24;} .dk{fill:#28241f;} .worm{fill:#a35a3e;}
    .wing{fill:#efe7d2;} .grn{fill:#7fae4b;}
  </style>
  <rect x="0" y="0" width="297" height="210" fill="#ffffff"/>
  <rect x="0" y="0" width="297" height="4" fill="#2e5d4e"/>

  <!-- header -->
  <image xlink:href="_giw-logo-t.png" href="_giw-logo-t.png" x="123.5" y="12" width="50" height="37" preserveAspectRatio="xMidYMid meet"/>
  <text x="148.5" y="66" text-anchor="middle" class="t" font-size="20">FuzzleWorld</text>
  <text x="148.5" y="75" text-anchor="middle" class="s" font-size="5">felt puzzle kits · a Giant Insect World collection</text>
  <line x1="113" y1="80" x2="184" y2="80" stroke="#cdd8d2" stroke-width="0.6"/>

  <!-- left column -->
  <g transform="translate(22,0)">
    <text x="0" y="98" class="h" font-size="6.5">What's a fuzzle?</text>
    <text x="0" y="107" class="b">A fuzzle is a felt puzzle. Every kit is a set of felt</text>
    <text x="0" y="112.5" class="b">squares plus a printed template. Trace the shapes onto</text>
    <text x="0" y="118" class="b">felt, cut them out, and lay them on the mat to build a</text>
    <text x="0" y="123.5" class="b">life-like British minibeast — then take it apart and</text>
    <text x="0" y="129" class="b">build it again, like Lego. No glue or stitching needed.</text>

    <text x="0" y="145" class="h" font-size="6.5">How it works</text>
    <text x="0" y="155" class="n">1</text><text x="7" y="155" class="b">Print a kit's template on A4 (landscape) at 100%.</text>
    <text x="0" y="163" class="n">2</text><text x="7" y="163" class="b">Trace each shape onto the matching colour of felt.</text>
    <text x="0" y="171" class="n">3</text><text x="7" y="171" class="b">Cut out the pieces.</text>
    <text x="0" y="179" class="n">4</text><text x="7" y="179" class="b">Build your creature on the mat — and rebuild any time.</text>
  </g>

  <!-- right column: the collection -->
  <g transform="translate(160,0)">
    <text x="0" y="98" class="h" font-size="6.5">In this collection</text>
    <text x="0" y="108" class="h" font-size="4.6" style="fill:#5a8a3a">MEADOW</text>
    <text x="0" y="114.5" class="b">Small Tortoiseshell butterfly</text>
    <text x="0" y="120" class="b">7-spot Ladybird</text>
    <text x="0" y="125.5" class="b">Meadow Grasshopper</text>
    <text x="0" y="137" class="h" font-size="4.6" style="fill:#3a6a8a">AQUATIC</text>
    <text x="0" y="143.5" class="b">River Skater</text>
    <text x="0" y="149" class="b">Common Darter dragonfly</text>
    <text x="0" y="154.5" class="b">Diving Bell Spider</text>
    <text x="0" y="166" class="h" font-size="4.6" style="fill:#8a6a3a">UNDERGROUND</text>
    <text x="0" y="172.5" class="b">Common Shiny Woodlouse</text>
    <text x="0" y="178" class="b">Common Earthworm</text>
    <text x="0" y="183.5" class="b">Black Garden Ant</text>
  </g>

  <!-- decorative silhouettes -->
  <g transform="translate(0,191)">
    <!-- butterfly -->
    <g transform="translate(30,0)"><path class="orange" d="M1 0 C 6 -5 11 -2 11 2 C 11 6 6 7 1 5 Z"/><path class="orange" d="M-1 0 C -6 -5 -11 -2 -11 2 C -11 6 -6 7 -1 5 Z"/><ellipse class="dk" cx="0" cy="2.5" rx="1.2" ry="5"/></g>
    <!-- ladybird -->
    <g transform="translate(62,1)"><ellipse class="red" cx="0" cy="0" rx="6" ry="5.5"/><path class="dk" d="M-3 -4 C -3 -6 3 -6 3 -4 C 3 -2.5 -3 -2.5 -3 -4 Z"/><circle class="dk" cx="0" cy="0" r="0.9"/><circle class="dk" cx="-3" cy="2.5" r="0.9"/><circle class="dk" cx="3" cy="2.5" r="0.9"/></g>
    <!-- dragonfly -->
    <g transform="translate(92,0)"><path class="wing" d="M0 -1 C 7 -3 12 -3 15 -2 C 12 0 7 0 0 0 Z"/><path class="wing" d="M0 -1 C -7 -3 -12 -3 -15 -2 C -12 0 -7 0 0 0 Z"/><path class="wing" d="M0 1 C 7 -1 11 -1 14 0 C 11 2 7 2 0 1 Z"/><path class="wing" d="M0 1 C -7 -1 -11 -1 -14 0 C -11 2 -7 2 0 1 Z"/><ellipse class="orange" cx="0" cy="3" rx="1.4" ry="6"/></g>
    <!-- worm -->
    <g transform="translate(125,0)"><path class="worm" d="M-8 4 C -4 -2 2 -3 6 -5 C 8 -6 9 -4 7 -3 C 3 -1 -3 0 -6 5 C -7 6.5 -9 5.5 -8 4 Z"/></g>
    <!-- ant -->
    <g transform="translate(152,1)"><ellipse class="dk" cx="0" cy="4" rx="3.5" ry="4"/><ellipse class="dk" cx="0" cy="-1" rx="1.8" ry="2.4"/><ellipse class="dk" cx="0" cy="-5" rx="2.2" ry="2.2"/><g stroke="#28241f" stroke-width="0.6" fill="none"><path d="M-1.5 0 C -4 1 -6 2 -8 4"/><path d="M-1.5 1.5 C -4 3 -6 4 -8 6"/><path d="M1.5 0 C 4 1 6 2 8 4"/><path d="M1.5 1.5 C 4 3 6 4 8 6"/></g></g>
  </g>

  <!-- footer -->
  <line x1="22" y1="199" x2="275" y2="199" stroke="#e0e0e0" stroke-width="0.4"/>
  <text x="22" y="204.5" class="s" fill="#888">Reference photos from iNaturalist under CC0 / CC-BY, credited in each kit  ·  Logo © Giant Insect World</text>
  <text x="275" y="204.5" text-anchor="end" class="s" fill="#888">Print every page at 100% (actual size)</text>
</svg>
