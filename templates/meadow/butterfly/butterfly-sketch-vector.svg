<svg xmlns="http://www.w3.org/2000/svg" width="200mm" height="180mm" viewBox="0 0 200 180">
  <!-- Vectorised from the user's hand sketch: broad sweeping forewings, scalloped hindwings,
       slender body, curved clubbed antennae. Right-side pieces defined once, mirrored for the left. -->
  <defs>
    <!-- RIGHT forewing (upper, broad) -->
    <path id="foreR" d="M 104 56 C 122 47 150 42 175 48 C 184 50 186 58 179 66
      C 170 83 156 95 137 100 C 123 103 112 103 106 100 C 105 86 104 69 104 56 Z"/>
    <!-- RIGHT hindwing (lower, scalloped bottom edge) -->
    <path id="hindR" d="M 106 101 C 123 99 145 101 157 111 C 163 116 163 126 157 133
      C 154 136 151 136 149 133 C 146 138 142 139 138 135 C 134 140 129 140 125 136
      C 121 141 116 140 112 136 C 109 132 107 123 106 114 C 106 109 106 104 106 101 Z"/>
  </defs>

  <rect width="200" height="180" fill="#ffffff"/>

  <g stroke="#2b2b2b" stroke-width="1.3" stroke-linejoin="round">
    <!-- hindwings -->
    <use href="#hindR" fill="#e79a3c"/>
    <use href="#hindR" fill="#e79a3c" transform="matrix(-1,0,0,1,200,0)"/>
    <!-- forewings -->
    <use href="#foreR" fill="#eea94e"/>
    <use href="#foreR" fill="#eea94e" transform="matrix(-1,0,0,1,200,0)"/>
    <!-- body -->
    <path fill="#4a3520" d="M 100 30 C 104 30 105.5 34 105.5 40 C 106 52 106 72 105 98
      C 104 122 102.5 146 100 156 C 97.5 146 96 122 95 98 C 94 72 94 52 94.5 40
      C 94.5 34 96 30 100 30 Z"/>
    <circle cx="100" cy="27" r="4" fill="#4a3520"/>
    <!-- antennae -->
    <g fill="none" stroke-width="1.6" stroke-linecap="round">
      <path d="M 99 26 C 92 17 86 11 81 7"/>
      <path d="M 101 26 C 108 17 114 11 119 7"/>
    </g>
    <circle cx="80.5" cy="6.5" r="2.1" fill="#2b2b2b" stroke="none"/>
    <circle cx="119.5" cy="6.5" r="2.1" fill="#2b2b2b" stroke="none"/>
  </g>
</svg>
