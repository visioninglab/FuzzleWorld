<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="297mm" height="210mm" viewBox="0 0 297 210">
  <!--
    FuzzleWorld × Giant Insect World — Small Tortoiseshell (butterfly) felt puzzle ("fuzzle")
    A4 LANDSCAPE, 6 x 2 panels. Cut pieces ACTUAL SIZE (print at 100%), may cross folds.
    RULE: the "Finished!" illustration is built from the SAME piece defs as the cut shapes.
    RULE: bottom-half text sits on a shared baseline grid (titles y10, subtitle y15, aligned steps & margins).
    Fonts: headings Nunito (rounded, stand-in for Averta Rounded) · body Source Serif 4.
    Photo © nevwright (Greater Manchester), CC-BY, via iNaturalist. Logo © Giant Insect World.
  -->
  <style>
    .t   { font-family:'Nunito ExtraBold', sans-serif; fill:#3a4a2b; }
    .n   { font-family:'Nunito ExtraBold', sans-serif; fill:#5a8a3a; font-size:4.2px; }
    .lbl { font-family:'Nunito ExtraBold', sans-serif; fill:#3a4a2b; font-size:2.9px; }
    .b   { font-family:'Source Serif 4', serif; fill:#333; font-size:2.8px; }
    .s   { font-family:'Source Serif 4', serif; fill:#666; font-size:2.3px; }
    .i   { font-family:'Source Serif 4', serif; fill:#2b2b2b; font-size:3.3px; }
    .cut { stroke:#1c1c1c; stroke-width:0.45; }
    .orange{ fill:#e07b28; } .dbrown{ fill:#5a4632; } .black{ fill:#241f1b; }
    .green{ fill:#9cb86a; } .blue{ fill:#6f8fd0; } .white{ fill:#f2efe6; }
  </style>

  <defs>
    <!-- root at (0,0) = where the wing meets the thorax. RIGHT wings; left = mirror. -->
    <!-- forewing: broad triangle, wider than tall, spreads out to the side; apex up-and-out -->
    <path id="forewing" d="M 0 -2 C 6 -6 14 -11 22 -14 C 24 -15 25.6 -13 25 -10.4 C 24 -6 22 -2 19 0.2 C 12 1.6 5 1.6 0.5 1.6 C 0 0.4 0 -1 0 -2 Z"/>
    <!-- hindwing: rounded fan, down-and-out, scalloped lower margin -->
    <path id="hindwing" d="M 0 0 C 6 -1 12 -1 17 1.5 C 21 3.5 22.5 8.5 20.5 13 C 18 17.5 11.5 18.5 6.5 16.5 C 2.5 14.5 0.5 9.5 0.2 4.5 C 0.1 2.8 0 1.4 0 0 Z"/>
    <!-- black costal markings along the forewing leading edge + apex -->
    <path id="femark" d="M 3 -4 C 9 -8 16 -12 22 -14 C 24 -15 25.6 -13 25 -10.4 C 24.3 -10 23.6 -10.2 23 -10.6 L 21 -12 L 20 -9.5 L 18 -10.6 L 17 -8 L 15 -8.6 L 12 -6.6 L 8 -6 C 6 -5 4 -4.6 3 -4 Z"/>
    <path id="body" d="M0 -20.5 C 3 -20.5 4 -16.5 4 -10.5 C 4 -0.5 3.5 9.5 2.5 15.5 C 2 18.5 1 20.5 0 20.5 C -1 20.5 -2 18.5 -2.5 15.5 C -3.5 9.5 -4 -0.5 -4 -10.5 C -4 -16.5 -3 -20.5 0 -20.5 Z"/>
    <path id="ant" d="M 9.2 40 L 10.4 40 L 10.4 61 C 12 61 12 66 9.8 66 C 7.6 66 7.6 61 9.2 61 Z"/>
  </defs>

  <rect x="0" y="0" width="297" height="210" fill="#ffffff"/>

  <!-- ===================== ROW 1 — CUT PIECES + finished + photo ===================== -->

  <!-- r1c1 : forewings -->
  <g transform="translate(0,0)">
    <text x="4" y="9" class="t" font-size="4">Forewings ×2</text>
    <text x="4" y="13" class="s">orange · the upper wings · actual size</text>
    <use href="#forewing" class="cut orange" transform="translate(5,34) scale(1.35)"/>
    <text x="6" y="42" class="s">right</text>
    <use href="#forewing" class="cut orange" transform="translate(45,72) scale(-1.35,1.35)"/>
    <text x="6" y="80" class="s">left (mirror)</text>
    <text x="4" y="101" class="s">broad triangle · the biggest pieces</text>
  </g>

  <!-- r1c2 : hindwings -->
  <g transform="translate(49.5,0)">
    <text x="4" y="9" class="t" font-size="4">Hindwings ×2</text>
    <text x="4" y="13" class="s">orange · the lower wings · actual size</text>
    <use href="#hindwing" class="cut orange" transform="translate(6,20) scale(1.3)"/>
    <text x="6" y="49" class="s">right</text>
    <use href="#hindwing" class="cut orange" transform="translate(44,52) scale(-1.3,1.3)"/>
    <text x="6" y="81" class="s">left (mirror)</text>
    <text x="4" y="101" class="s">rounded fan · sits below the forewing</text>
  </g>

  <!-- r1c3 : markings + body + antennae -->
  <g transform="translate(99,0)">
    <text x="4" y="9" class="t" font-size="4">Markings, body,</text>
    <text x="4" y="14" class="t" font-size="4">antennae</text>
    <use href="#femark" class="cut black" transform="translate(4,40) scale(1.05)"/>
    <use href="#femark" class="cut black" transform="translate(43,52) scale(-1.05,1.05)"/>
    <text x="4" y="55" class="s">forewing markings ×2 · black</text>
    <text x="4" y="58.5" class="s">(sit along each forewing's top edge)</text>
    <use href="#body" class="cut dbrown" transform="translate(10,80)"/>
    <text x="16" y="76" class="s">body ×1</text><text x="16" y="79.5" class="s">dark brown</text>
    <use href="#ant" class="cut dbrown" transform="translate(23,24)"/>
    <use href="#ant" class="cut dbrown" transform="translate(30,24)"/>
    <text x="26" y="95" class="s">antennae ×2</text>
  </g>

  <!-- r1c4 : finished — BUILT FROM THE SAME PIECE DEFS -->
  <g transform="translate(148.5,0)">
    <text x="4" y="9" class="t" font-size="4.2">Finished!</text>
    <text x="4" y="13" class="s">the same pieces, assembled</text>
    <rect class="green" x="4" y="24" width="42" height="56" rx="4" opacity="0.6"/>
    <g transform="translate(24.75,52)">
      <!-- hindwings (from #hindwing) — smaller, down &amp; out below the forewings -->
      <use href="#hindwing" class="orange cut" transform="translate(0.5,-0.5) scale(0.48)"/>
      <use href="#hindwing" class="orange cut" transform="translate(-0.5,-0.5) scale(-0.48,0.48)"/>
      <!-- forewings (from #forewing) — big &amp; broad, spread wide -->
      <use href="#forewing" class="orange cut" transform="translate(0.5,-3) scale(0.6)"/>
      <use href="#forewing" class="orange cut" transform="translate(-0.5,-3) scale(-0.6,0.6)"/>
      <!-- markings (from #femark) -->
      <use href="#femark" class="black" transform="translate(0.5,-3) scale(0.6)"/>
      <use href="#femark" class="black" transform="translate(-0.5,-3) scale(-0.6,0.6)"/>
      <!-- body (from #body) -->
      <use href="#body" class="dbrown" transform="scale(0.42)"/>
      <!-- antennae -->
      <path d="M-0.6 -8 C -2 -12 -3.5 -14 -5 -15.5" stroke="#5a4632" stroke-width="0.7" fill="none"/>
      <path d="M0.6 -8 C 2 -12 3.5 -14 5 -15.5" stroke="#5a4632" stroke-width="0.7" fill="none"/>
      <circle class="dbrown" cx="-5" cy="-15.5" r="0.9"/><circle class="dbrown" cx="5" cy="-15.5" r="0.9"/>
      <!-- optional extras (see instructions): wingtip dots, edge dots, spots -->
      <circle class="white" cx="14" cy="-8.5" r="1"/><circle class="white" cx="-14" cy="-8.5" r="1"/>
      <g fill="#6f8fd0"><circle cx="8" cy="6.5" r="0.8"/><circle cx="5" cy="7.8" r="0.8"/><circle cx="-8" cy="6.5" r="0.8"/><circle cx="-5" cy="7.8" r="0.8"/></g>
      <g fill="#241f1b"><circle cx="8" cy="-4.5" r="1"/><circle cx="-8" cy="-4.5" r="1"/></g>
    </g>
    <text x="24.75" y="88" text-anchor="middle" class="s">forewings over hindwings · body down the centre · ≈ 13 × 9 cm</text>
  </g>

  <!-- r1c5 : the real thing -->
  <g transform="translate(198,0)">
    <text x="4" y="9" class="t" font-size="4.2">The real thing</text>
    <image xlink:href="_thumb.jpg" href="_thumb.jpg" x="5" y="13" width="39.5" height="26" preserveAspectRatio="xMidYMid slice"/>
    <rect x="5" y="13" width="39.5" height="26" fill="none" stroke="#c8c2b2" stroke-width="0.4"/>
    <text x="4" y="47" class="b">Aglais urticae — the Small</text>
    <text x="4" y="51" class="b">Tortoiseshell, a common</text>
    <text x="4" y="55" class="b">meadow &amp; garden butterfly.</text>
    <text x="4" y="64" class="s">Photo © nevwright, CC-BY, via</text>
    <text x="4" y="67.5" class="s">iNaturalist. Photographed in</text>
    <text x="4" y="71" class="s">Greater Manchester — about</text>
    <text x="4" y="74.5" class="s">17 km from the city.</text>
  </g>

  <!-- r1c6 : did you know -->
  <g transform="translate(247.5,0)">
    <text x="4" y="9" class="t" font-size="4.2">Did you know?</text>
    <text x="4" y="20" class="b">· One of Britain's most</text>
    <text x="6" y="23.8" class="b">common, colourful butterflies.</text>
    <text x="4" y="33" class="b">· Adults hibernate over winter</text>
    <text x="6" y="36.8" class="b">— often in sheds and houses.</text>
    <text x="4" y="46" class="b">· Its caterpillars eat only</text>
    <text x="6" y="49.8" class="b">stinging nettles.</text>
    <text x="4" y="59" class="b">· It basks with wings open</text>
    <text x="6" y="62.8" class="b">to warm up in the sun.</text>
    <text x="4" y="72" class="b">· The blue crescents on the</text>
    <text x="6" y="75.8" class="b">wing edge warn off birds.</text>
  </g>

  <!-- ===================== ROW 2 — aligned grid: title y10, sub y15, steps y28/44/60 ===================== -->

  <!-- r2c1 : how to make it -->
  <g transform="translate(0,105)">
    <text x="4" y="10" class="t" font-size="4.6">How to make it</text>
    <text x="4" y="15" class="s">from your felt squares</text>
    <text x="5" y="28" class="n">1</text><text x="11" y="27.5" class="i">Trace each shape onto</text><text x="11" y="31.7" class="i">the right felt colour.</text>
    <text x="5" y="44" class="n">2</text><text x="11" y="43.5" class="i">Cut out all 9 pieces.</text>
    <text x="5" y="55" class="n">3</text><text x="11" y="54.5" class="i">Build it on the mat →</text>
    <text x="4" y="66" class="lbl">Felt squares you'll use:</text>
    <rect class="cut orange" x="4" y="69" width="4.5" height="4.5" rx="0.9"/><text x="11" y="72.6" class="b">orange — wings</text>
    <rect class="cut black"  x="4" y="75" width="4.5" height="4.5" rx="0.9"/><text x="11" y="78.6" class="b">black — forewing markings</text>
    <rect class="cut dbrown" x="4" y="81" width="4.5" height="4.5" rx="0.9"/><text x="11" y="84.6" class="b">dark brown — body &amp; antennae</text>
    <text x="4" y="92" class="s">Optional: white wingtip dots, blue edge dots.</text>
    <text x="4" y="95.5" class="s">Green meadow mat/pouch is premade.</text>
  </g>

  <!-- r2c2 : build it (1-3) -->
  <g transform="translate(49.5,105)">
    <text x="4" y="10" class="t" font-size="4.6">Build it</text>
    <text x="4" y="15" class="s">lay the pieces on the mat</text>
    <text x="5" y="28" class="n">1</text><text x="11" y="27.5" class="i">Lay the green mat down</text><text x="11" y="31.7" class="i">— that's your meadow.</text>
    <text x="5" y="44" class="n">2</text><text x="11" y="43.5" class="i">Place the 2 hindwings,</text><text x="11" y="47.7" class="i">then 2 forewings on top,</text><text x="11" y="51.9" class="i">meeting in the middle.</text>
    <text x="5" y="60" class="n">3</text><text x="11" y="59.5" class="i">Lay the body down the</text><text x="11" y="63.7" class="i">centre, over the wings.</text>
    <text x="4" y="84" class="s">Nothing is fixed — the pieces</text>
    <text x="4" y="87.5" class="s">just sit like a jigsaw.</text>
  </g>

  <!-- r2c3 : …and again (4-6) -->
  <g transform="translate(99,105)">
    <text x="4" y="10" class="t" font-size="4.6">…and again</text>
    <text x="4" y="15" class="s">it's a puzzle, not a glue-up</text>
    <text x="5" y="28" class="n">4</text><text x="11" y="27.5" class="i">Add a black marking to</text><text x="11" y="31.7" class="i">each forewing's edge.</text>
    <text x="5" y="44" class="n">5</text><text x="11" y="43.5" class="i">Add the 2 antennae at</text><text x="11" y="47.7" class="i">the head, in a V.</text>
    <text x="5" y="60" class="n">6</text><text x="11" y="59.5" class="i">Done! Take it apart</text><text x="11" y="63.7" class="i">and build it all again.</text>
    <text x="4" y="84" class="s">Feeling fancy? Add white wingtip</text>
    <text x="4" y="87.5" class="s">dots and blue edge dots.</text>
  </g>

  <!-- r2c4 : at a glance -->
  <g transform="translate(148.5,105)">
    <text x="4" y="10" class="t" font-size="4.2">At a glance</text>
    <text x="4" y="20" class="lbl">9 felt pieces</text>
    <text x="6" y="27" class="b">· 2 forewings (orange)</text>
    <text x="6" y="33" class="b">· 2 hindwings (orange)</text>
    <text x="6" y="39" class="b">· 2 forewing markings (black)</text>
    <text x="6" y="45" class="b">· 1 body (dark brown)</text>
    <text x="6" y="51" class="b">· 2 antennae (dark brown)</text>
    <text x="4" y="62" class="lbl">Finished size</text>
    <text x="6" y="69" class="b">≈ 13 × 9 cm</text>
    <text x="4" y="80" class="s">Theme: Meadow. Collect the</text>
    <text x="4" y="83.5" class="s">butterfly, ladybird and grasshopper.</text>
  </g>

  <!-- r2c5 : cover -->
  <g transform="translate(198,105)">
    <rect x="1.5" y="1.5" width="46.5" height="49.5" rx="3" fill="#ffffff" stroke="#dfe4d8" stroke-width="0.5"/>
    <rect x="1.5" y="1.5" width="46.5" height="3" rx="1.5" fill="#5a8a3a"/>
    <image xlink:href="_giw-logo-t.png" href="_giw-logo-t.png" x="12" y="7" width="25.5" height="18.9" preserveAspectRatio="xMidYMid meet"/>
    <text x="24.75" y="31" text-anchor="middle" class="b" font-size="3.2">Make your own</text>
    <text x="24.75" y="38.5" text-anchor="middle" class="t" font-size="4.3">Small Tortoiseshell</text>
    <line x1="18" y1="41.5" x2="31.5" y2="41.5" stroke="#cdd6c4" stroke-width="0.5"/>
    <text x="24.75" y="47.5" text-anchor="middle" class="t" font-size="4.6" fill="#5a8a3a">Instructions</text>
    <text x="24.75" y="63" text-anchor="middle" class="b">A Giant Insect World felt puzzle</text>
    <text x="24.75" y="67.5" text-anchor="middle" class="s">build it · take it apart · build it again</text>
    <g transform="translate(24.75,84)">
      <path class="orange" d="M2 1 C 8 -3 14 0 14 5 C 14 9 8 10 2 8 Z"/>
      <path class="orange" d="M-2 1 C -8 -3 -14 0 -14 5 C -14 9 -8 10 -2 8 Z"/>
      <path class="black" d="M4 0 C 8 -3 12 -1 13 2 L 11 1 L 9 2 L 7 1 Z"/>
      <path class="black" d="M-4 0 C -8 -3 -12 -1 -13 2 L -11 1 L -9 2 L -7 1 Z"/>
      <ellipse class="dbrown" cx="0" cy="4" rx="1.4" ry="7"/>
      <path d="M-0.5 -2 C -2 -5 -3 -6 -4 -7" stroke="#5a4632" stroke-width="0.5" fill="none"/>
      <path d="M0.5 -2 C 2 -5 3 -6 4 -7" stroke="#5a4632" stroke-width="0.5" fill="none"/>
    </g>
  </g>

  <!-- r2c6 : back / collect -->
  <g transform="translate(247.5,105)">
    <text x="24.75" y="17" text-anchor="middle" class="t" font-size="7" fill="#5a8a3a">FuzzleWorld</text>
    <text x="24.75" y="22.5" text-anchor="middle" class="s">downloadable felt puzzle kits</text>
    <text x="24.75" y="39" text-anchor="middle" class="t" font-size="3.8">Collect the set</text>
    <text x="24.75" y="48" text-anchor="middle" class="b">Meadow · Aquatic · Underground</text>
    <text x="24.75" y="58" text-anchor="middle" class="s">butterfly · ladybird · grasshopper</text>
    <text x="24.75" y="61.5" text-anchor="middle" class="s">river skater · dragonfly · more…</text>
    <text x="24.75" y="86" text-anchor="middle" class="s">Species: Aglais urticae · Photo</text>
    <text x="24.75" y="89.5" text-anchor="middle" class="s">© nevwright, CC-BY · Logo ©</text>
    <text x="24.75" y="93" text-anchor="middle" class="s">Giant Insect World</text>
  </g>

  <!-- ===================== FOLD GRID + trim + note ===================== -->
  <!-- fold marks: neat tick marks at the sheet edges (fold the sheet where they line up) -->
  <g stroke="#aeb6a6" stroke-width="0.5" fill="none">
    <line x1="49.5"  y1="0" x2="49.5"  y2="5"/><line x1="49.5"  y1="205" x2="49.5"  y2="210"/>
    <line x1="99"    y1="0" x2="99"    y2="5"/><line x1="99"    y1="205" x2="99"    y2="210"/>
    <line x1="148.5" y1="0" x2="148.5" y2="5"/><line x1="148.5" y1="205" x2="148.5" y2="210"/>
    <line x1="198"   y1="0" x2="198"   y2="5"/><line x1="198"   y1="205" x2="198"   y2="210"/>
    <line x1="247.5" y1="0" x2="247.5" y2="5"/><line x1="247.5" y1="205" x2="247.5" y2="210"/>
    <line x1="0" y1="105" x2="5" y2="105"/><line x1="292" y1="105" x2="297" y2="105"/>
  </g>
  <rect x="0.4" y="0.4" width="296.2" height="209.2" fill="none" stroke="#d7d7d7" stroke-width="0.4"/>
  <text x="4" y="208.4" class="s" fill="#b3b3b3" font-size="1.9">Print A4 landscape at 100% (actual size) · fold into 6 × 2 where the edge marks line up · cover = top half of row 2, column 5</text>
</svg>
