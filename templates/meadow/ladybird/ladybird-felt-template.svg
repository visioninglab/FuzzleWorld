<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="297mm" height="210mm" viewBox="0 0 297 210">
  <!--
    FuzzleWorld × Giant Insect World — 7-spot Ladybird felt puzzle ("fuzzle")
    A4 LANDSCAPE, 6 x 2 panels. Cut pieces ACTUAL SIZE (print 100%), may cross folds.
    RULE: "Finished!" built from the same piece defs. RULE: bottom text on shared grid. Fold ticks at edges. Logo bg removed.
    Fonts: headings Nunito (stand-in for Averta Rounded) · body Source Serif 4.
    Photo © Alfie Felton (Wardle, Rochdale), CC0, via iNaturalist. Logo © Giant Insect World.
  -->
  <style>
    .t   { font-family:'Nunito ExtraBold', sans-serif; fill:#3a4a2b; }
    .n   { font-family:'Nunito ExtraBold', sans-serif; fill:#5a8a3a; font-size:4.2px; }
    .lbl { font-family:'Nunito ExtraBold', sans-serif; fill:#3a4a2b; font-size:2.9px; }
    .b   { font-family:'Source Serif 4', serif; fill:#333; font-size:2.8px; }
    .s   { font-family:'Source Serif 4', serif; fill:#666; font-size:2.3px; }
    .i   { font-family:'Source Serif 4', serif; fill:#2b2b2b; font-size:3.3px; }
    .cut { stroke:#1c1c1c; stroke-width:0.45; }
    .red{ fill:#d22a24; } .black{ fill:#201b18; } .white{ fill:#f2efe6; } .green{ fill:#9cb86a; }
  </style>

  <defs>
    <!-- red domed body (elytra), centred; ~38 mm across -->
    <path id="body" d="M0 -17 C 9 -17.5 18 -11 19 0 C 19 11 12 19 0 19 C -12 19 -19 11 -19 0 C -18 -11 -9 -17.5 0 -17 Z"/>
    <!-- black pronotum/head; sits over the front of the body -->
    <path id="head" d="M-8.5 4.5 C -8.5 -1 -4.5 -4.5 0 -4.5 C 4.5 -4.5 8.5 -1 8.5 4.5 C 8.5 5.8 7.2 6.5 5 6.5 L -5 6.5 C -7.2 6.5 -8.5 5.8 -8.5 4.5 Z"/>
    <!-- black spot -->
    <circle id="spot" r="2.7"/>
    <!-- small tapered leg -->
    <path id="leg" d="M0 0 C 4 0.3 8 1 11 2.4 C 8 2.9 4 2.6 0 2.4 Z"/>
  </defs>

  <rect x="0" y="0" width="297" height="210" fill="#ffffff"/>

  <!-- ===================== ROW 1 — CUT PIECES + finished + photo ===================== -->

  <!-- r1c1 : body -->
  <g transform="translate(0,0)">
    <text x="4" y="9" class="t" font-size="4">Body ×1</text>
    <text x="4" y="13" class="s">red · the domed wing-cases · actual size</text>
    <use href="#body" class="cut red" transform="translate(24.75,54)"/>
    <line x1="24.75" y1="40" x2="24.75" y2="71" stroke="#8a1e1a" stroke-width="0.3" stroke-dasharray="1.4 1"/>
    <text x="24.75" y="98" text-anchor="middle" class="s">dashed = centre line (guide, don't cut)</text>
  </g>

  <!-- r1c2 : head + legs -->
  <g transform="translate(49.5,0)">
    <text x="4" y="9" class="t" font-size="4">Head &amp; legs</text>
    <text x="4" y="13" class="s">black · actual size</text>
    <use href="#head" class="cut black" transform="translate(24,26)"/>
    <circle class="cut white" cx="20" cy="24" r="1.6"/><circle class="cut white" cx="28" cy="24" r="1.6"/>
    <text x="4" y="40" class="s">head ×1 · black · with 2 white cheek dots</text>
    <use href="#leg" class="cut black" transform="translate(8,52)"/>
    <use href="#leg" class="cut black" transform="translate(8,58)"/>
    <use href="#leg" class="cut black" transform="translate(8,64)"/>
    <use href="#leg" class="cut black" transform="translate(28,52)"/>
    <use href="#leg" class="cut black" transform="translate(28,58)"/>
    <use href="#leg" class="cut black" transform="translate(28,64)"/>
    <text x="4" y="76" class="s">legs ×6 · black · taper to a point</text>
  </g>

  <!-- r1c3 : spots -->
  <g transform="translate(99,0)">
    <text x="4" y="9" class="t" font-size="4">Spots ×7</text>
    <text x="4" y="13" class="s">black · actual size · cut 7</text>
    <use href="#spot" class="cut black" transform="translate(11,26)"/>
    <use href="#spot" class="cut black" transform="translate(23,26)"/>
    <use href="#spot" class="cut black" transform="translate(35,26)"/>
    <use href="#spot" class="cut black" transform="translate(17,38)"/>
    <use href="#spot" class="cut black" transform="translate(29,38)"/>
    <use href="#spot" class="cut black" transform="translate(41,38)"/>
    <use href="#spot" class="cut black" transform="translate(23,50)"/>
    <text x="4" y="64" class="s">1 goes at the top centre,</text>
    <text x="4" y="67.5" class="s">then 3 on each wing-case.</text>
  </g>

  <!-- r1c4 : finished — BUILT FROM THE SAME PIECE DEFS -->
  <g transform="translate(148.5,0)">
    <text x="4" y="9" class="t" font-size="4.2">Finished!</text>
    <text x="4" y="13" class="s">the same pieces, assembled</text>
    <rect class="green" x="6" y="24" width="38" height="54" rx="4" opacity="0.6"/>
    <g transform="translate(25,53)">
      <!-- legs (behind) -->
      <g stroke="#201b18" stroke-width="1.1" stroke-linecap="round">
        <line x1="-9" y1="-4" x2="-15" y2="-7"/><line x1="-10" y1="1" x2="-16" y2="1"/><line x1="-9" y1="6" x2="-15" y2="9"/>
        <line x1="9" y1="-4" x2="15" y2="-7"/><line x1="10" y1="1" x2="16" y2="1"/><line x1="9" y1="6" x2="15" y2="9"/>
      </g>
      <!-- red body -->
      <use href="#body" class="red cut" transform="scale(0.62)"/>
      <!-- centre line -->
      <line x1="0" y1="-6" x2="0" y2="11.5" stroke="#8a1e1a" stroke-width="0.4"/>
      <!-- head at front (top) -->
      <use href="#head" class="black" transform="translate(0,-11.5) scale(0.62)"/>
      <circle class="white" cx="-2.6" cy="-13" r="0.9"/><circle class="white" cx="2.6" cy="-13" r="0.9"/>
      <!-- 7 spots -->
      <circle class="black" cx="0" cy="-6" r="1.7"/>
      <circle class="black" cx="-5" cy="-1" r="1.7"/><circle class="black" cx="5" cy="-1" r="1.7"/>
      <circle class="black" cx="-6.5" cy="4.5" r="1.7"/><circle class="black" cx="6.5" cy="4.5" r="1.7"/>
      <circle class="black" cx="-3.5" cy="9" r="1.7"/><circle class="black" cx="3.5" cy="9" r="1.7"/>
    </g>
    <text x="24.75" y="86" text-anchor="middle" class="s">red body · black head · 7 spots · ≈ 7 × 6 cm</text>
  </g>

  <!-- r1c5 : the real thing -->
  <g transform="translate(198,0)">
    <text x="4" y="9" class="t" font-size="4.2">The real thing</text>
    <image xlink:href="_thumb.jpg" href="_thumb.jpg" x="5" y="13" width="39.5" height="26" preserveAspectRatio="xMidYMid slice"/>
    <rect x="5" y="13" width="39.5" height="26" fill="none" stroke="#c8c2b2" stroke-width="0.4"/>
    <text x="4" y="47" class="b">Coccinella septempunctata</text>
    <text x="4" y="51" class="b">— the 7-spot ladybird,</text>
    <text x="4" y="55" class="b">Britain's most familiar.</text>
    <text x="4" y="64" class="s">Photo © Alfie Felton, CC0, via</text>
    <text x="4" y="67.5" class="s">iNaturalist. Photographed at</text>
    <text x="4" y="71" class="s">Wardle, Rochdale — about</text>
    <text x="4" y="74.5" class="s">20 km from Manchester.</text>
  </g>

  <!-- r1c6 : did you know -->
  <g transform="translate(247.5,0)">
    <text x="4" y="9" class="t" font-size="4.2">Did you know?</text>
    <text x="4" y="20" class="b">· The "7 spots": one in the</text>
    <text x="6" y="23.8" class="b">middle + three on each side.</text>
    <text x="4" y="33" class="b">· It's a gardener's friend —</text>
    <text x="6" y="36.8" class="b">it eats hundreds of aphids.</text>
    <text x="4" y="46" class="b">· Bright red warns birds that</text>
    <text x="6" y="49.8" class="b">it tastes horrible.</text>
    <text x="4" y="59" class="b">· It can ooze yucky yellow</text>
    <text x="6" y="62.8" class="b">blood from its knees!</text>
    <text x="4" y="72" class="b">· They hibernate in groups</text>
    <text x="6" y="75.8" class="b">over winter.</text>
  </g>

  <!-- ===================== ROW 2 — aligned grid ===================== -->

  <!-- r2c1 : how to make it -->
  <g transform="translate(0,105)">
    <text x="4" y="10" class="t" font-size="4.6">How to make it</text>
    <text x="4" y="15" class="s">from your felt squares</text>
    <text x="5" y="28" class="n">1</text><text x="11" y="27.5" class="i">Trace each shape onto</text><text x="11" y="31.7" class="i">the right felt colour.</text>
    <text x="5" y="44" class="n">2</text><text x="11" y="43.5" class="i">Cut out all 15 pieces.</text>
    <text x="5" y="55" class="n">3</text><text x="11" y="54.5" class="i">Build it on the mat →</text>
    <text x="4" y="66" class="lbl">Felt squares you'll use:</text>
    <rect class="cut red"   x="4" y="69" width="4.5" height="4.5" rx="0.9"/><text x="11" y="72.6" class="b">red — body</text>
    <rect class="cut black" x="4" y="75" width="4.5" height="4.5" rx="0.9"/><text x="11" y="78.6" class="b">black — head, spots, legs</text>
    <rect class="cut white" x="4" y="81" width="4.5" height="4.5" rx="0.9"/><text x="11" y="84.6" class="b">white — 2 cheek dots (optional)</text>
    <text x="4" y="95" class="s">Green meadow mat/pouch is premade.</text>
  </g>

  <!-- r2c2 : build it (1-3) -->
  <g transform="translate(49.5,105)">
    <text x="4" y="10" class="t" font-size="4.6">Build it</text>
    <text x="4" y="15" class="s">lay the pieces on the mat</text>
    <text x="5" y="28" class="n">1</text><text x="11" y="27.5" class="i">Lay the green mat down</text><text x="11" y="31.7" class="i">— that's your meadow.</text>
    <text x="5" y="44" class="n">2</text><text x="11" y="43.5" class="i">Place the red body, then</text><text x="11" y="47.7" class="i">the black head at the front.</text>
    <text x="5" y="60" class="n">3</text><text x="11" y="59.5" class="i">Tuck the 6 legs under —</text><text x="11" y="63.7" class="i">three each side.</text>
    <text x="4" y="84" class="s">Nothing is fixed — the pieces</text>
    <text x="4" y="87.5" class="s">just sit like a jigsaw.</text>
  </g>

  <!-- r2c3 : …and again (4-6) -->
  <g transform="translate(99,105)">
    <text x="4" y="10" class="t" font-size="4.6">…and again</text>
    <text x="4" y="15" class="s">it's a puzzle, not a glue-up</text>
    <text x="5" y="28" class="n">4</text><text x="11" y="27.5" class="i">Dot on the 7 spots: one</text><text x="11" y="31.7" class="i">top-centre, 3 each side.</text>
    <text x="5" y="44" class="n">5</text><text x="11" y="43.5" class="i">Add 2 white cheek dots</text><text x="11" y="47.7" class="i">on the head (optional).</text>
    <text x="5" y="60" class="n">6</text><text x="11" y="59.5" class="i">Done! Take it apart</text><text x="11" y="63.7" class="i">and build it all again.</text>
    <text x="4" y="84" class="s">Every ladybird can be different</text>
    <text x="4" y="87.5" class="s">— move the spots around!</text>
  </g>

  <!-- r2c4 : at a glance -->
  <g transform="translate(148.5,105)">
    <text x="4" y="10" class="t" font-size="4.2">At a glance</text>
    <text x="4" y="20" class="lbl">15 felt pieces</text>
    <text x="6" y="27" class="b">· 1 body (red)</text>
    <text x="6" y="33" class="b">· 1 head (black)</text>
    <text x="6" y="39" class="b">· 7 spots (black)</text>
    <text x="6" y="45" class="b">· 6 legs (black)</text>
    <text x="6" y="51" class="b">+ 2 cheek dots (white, optional)</text>
    <text x="4" y="62" class="lbl">Finished size</text>
    <text x="6" y="69" class="b">≈ 7 × 6 cm</text>
    <text x="4" y="80" class="s">Theme: Meadow. Collect the</text>
    <text x="4" y="83.5" class="s">butterfly, ladybird and grasshopper.</text>
  </g>

  <!-- r2c5 : cover -->
  <g transform="translate(198,105)">
    <rect x="1.5" y="1.5" width="46.5" height="49.5" rx="3" fill="#ffffff" stroke="#dfe4d8" stroke-width="0.5"/>
    <rect x="1.5" y="1.5" width="46.5" height="3" rx="1.5" fill="#5a8a3a"/>
    <image xlink:href="_giw-logo-t.png" href="_giw-logo-t.png" x="12" y="7" width="25.5" height="18.9" preserveAspectRatio="xMidYMid meet"/>
    <text x="24.75" y="31" text-anchor="middle" class="b" font-size="3.2">Make your own</text>
    <text x="24.75" y="38.5" text-anchor="middle" class="t" font-size="5">7-spot Ladybird</text>
    <line x1="18" y1="41.5" x2="31.5" y2="41.5" stroke="#cdd6c4" stroke-width="0.5"/>
    <text x="24.75" y="47.5" text-anchor="middle" class="t" font-size="4.6" fill="#5a8a3a">Instructions</text>
    <text x="24.75" y="63" text-anchor="middle" class="b">A Giant Insect World felt puzzle</text>
    <text x="24.75" y="67.5" text-anchor="middle" class="s">build it · take it apart · build it again</text>
    <!-- tiny ladybird -->
    <g transform="translate(24.75,84)">
      <ellipse class="red" cx="0" cy="1" rx="8" ry="7"/>
      <line x1="0" y1="-4" x2="0" y2="8" stroke="#8a1e1a" stroke-width="0.4"/>
      <path class="black" d="M-4 -5 C -4 -8 4 -8 4 -5 C 4 -3.5 2 -3 0 -3 C -2 -3 -4 -3.5 -4 -5 Z"/>
      <circle class="black" cx="0" cy="-1" r="0.9"/><circle class="black" cx="-3.4" cy="1.3" r="0.9"/><circle class="black" cx="3.4" cy="1.3" r="0.9"/><circle class="black" cx="-4" cy="4.2" r="0.9"/><circle class="black" cx="4" cy="4.2" r="0.9"/><circle class="black" cx="-2.2" cy="6.6" r="0.9"/><circle class="black" cx="2.2" cy="6.6" r="0.9"/>
    </g>
  </g>

  <!-- r2c6 : back / collect -->
  <g transform="translate(247.5,105)">
    <text x="24.75" y="17" text-anchor="middle" class="t" font-size="7" fill="#5a8a3a">FuzzleWorld</text>
    <text x="24.75" y="22.5" text-anchor="middle" class="s">downloadable felt puzzle kits</text>
    <text x="24.75" y="39" text-anchor="middle" class="t" font-size="3.8">Collect the set</text>
    <text x="24.75" y="48" text-anchor="middle" class="b">Meadow · Aquatic · Underground</text>
    <text x="24.75" y="58" text-anchor="middle" class="s">butterfly · ladybird · grasshopper</text>
    <text x="24.75" y="61.5" text-anchor="middle" class="s">river skater · dragonfly · more…</text>
    <text x="24.75" y="86" text-anchor="middle" class="s">Species: C. septempunctata · Photo</text>
    <text x="24.75" y="89.5" text-anchor="middle" class="s">© Alfie Felton, CC0 · Logo ©</text>
    <text x="24.75" y="93" text-anchor="middle" class="s">Giant Insect World</text>
  </g>

  <!-- ===================== FOLD MARKS + trim + note ===================== -->
  <g stroke="#aeb6a6" stroke-width="0.5" fill="none">
    <line x1="49.5"  y1="0" x2="49.5"  y2="5"/><line x1="49.5"  y1="205" x2="49.5"  y2="210"/>
    <line x1="99"    y1="0" x2="99"    y2="5"/><line x1="99"    y1="205" x2="99"    y2="210"/>
    <line x1="148.5" y1="0" x2="148.5" y2="5"/><line x1="148.5" y1="205" x2="148.5" y2="210"/>
    <line x1="198"   y1="0" x2="198"   y2="5"/><line x1="198"   y1="205" x2="198"   y2="210"/>
    <line x1="247.5" y1="0" x2="247.5" y2="5"/><line x1="247.5" y1="205" x2="247.5" y2="210"/>
    <line x1="0" y1="105" x2="5" y2="105"/><line x1="292" y1="105" x2="297" y2="105"/>
  </g>
  <rect x="0.4" y="0.4" width="296.2" height="209.2" fill="none" stroke="#d7d7d7" stroke-width="0.4"/>
  <text x="4" y="208.4" class="s" fill="#b3b3b3" font-size="1.9">Print A4 landscape at 100% (actual size) · fold into 6 × 2 where the edge marks line up · cover = top half of row 2, column 5</text>
</svg>
