<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="297mm" height="210mm" viewBox="0 0 297 210">
  <!--
    FuzzleWorld × Giant Insect World — Diving Bell Spider felt puzzle. A4 landscape, 6x2. Pieces actual size, may cross folds.
    Finished from same defs. Bottom text on shared grid. Fold ticks. Logo bg removed.
    Photo © mark-sundown (Llanelli), CC-BY, via iNaturalist. Logo © Giant Insect World.
  -->
  <style>
    .t{font-family:'Nunito ExtraBold',sans-serif;fill:#2b3a44;} .n{font-family:'Nunito ExtraBold',sans-serif;fill:#3a6a8a;font-size:4.2px;}
    .lbl{font-family:'Nunito ExtraBold',sans-serif;fill:#2b3a44;font-size:2.9px;}
    .b{font-family:'Source Serif 4',serif;fill:#333;font-size:2.8px;} .s{font-family:'Source Serif 4',serif;fill:#666;font-size:2.3px;}
    .i{font-family:'Source Serif 4',serif;fill:#2b2b2b;font-size:3.3px;} .cut{stroke:#1c1c1c;stroke-width:0.45;}
    .dk{fill:#4a3626;} .bub{fill:#c6d2da;} .blue{fill:#9cc0d6;}
  </style>
  <defs>
    <path id="abdomen" d="M0 -13 C 8 -13 14 -7 14 2 C 14 10 8 15 0 15 C -8 15 -14 10 -14 2 C -14 -7 -8 -13 0 -13 Z"/>
    <path id="ceph" d="M0 -8 C 5 -8 8.5 -4 8.5 0.5 C 8.5 5 5 8 0 8 C -5 8 -8.5 5 -8.5 0.5 C -8.5 -4 -5 -8 0 -8 Z"/>
    <path id="leg" d="M0 0 C 8 0.3 16 1 24 2.6 C 16 3.1 8 2.8 0 2.6 Z"/>
    <path id="bubble" d="M0 -15 C 10 -15 17 -8 17 1 C 17 11 10 18 0 18 C -10 18 -17 11 -17 1 C -17 -8 -10 -15 0 -15 Z"/>
  </defs>
  <rect x="0" y="0" width="297" height="210" fill="#ffffff"/>

  <!-- r1c1 body parts -->
  <g transform="translate(0,0)">
    <text x="4" y="9" class="t" font-size="4">Body</text><text x="4" y="13" class="s">dark brown · actual size</text>
    <use href="#ceph" class="cut dk" transform="translate(24,32)"/>
    <text x="4" y="46" class="s">cephalothorax ×1 (front body)</text>
    <use href="#abdomen" class="cut dk" transform="translate(24,66)"/>
    <text x="4" y="90" class="s">abdomen ×1 (round back body)</text>
  </g>
  <!-- r1c2 legs -->
  <g transform="translate(49.5,0)">
    <text x="4" y="9" class="t" font-size="4">Legs ×8</text><text x="4" y="13" class="s">dark brown · actual size · 4 each side</text>
    <use href="#leg" class="cut dk" transform="translate(6,22)"/>
    <use href="#leg" class="cut dk" transform="translate(6,30)"/>
    <use href="#leg" class="cut dk" transform="translate(6,38)"/>
    <use href="#leg" class="cut dk" transform="translate(6,46)"/>
    <use href="#leg" class="cut dk" transform="translate(6,54)"/>
    <use href="#leg" class="cut dk" transform="translate(6,62)"/>
    <use href="#leg" class="cut dk" transform="translate(6,70)"/>
    <use href="#leg" class="cut dk" transform="translate(6,78)"/>
    <text x="4" y="90" class="s">long &amp; thin — spread them out wide</text>
  </g>
  <!-- r1c3 air bubble -->
  <g transform="translate(99,0)">
    <text x="4" y="9" class="t" font-size="4">Air bubble ×1</text><text x="4" y="13" class="s">pale silver · actual size</text>
    <use href="#bubble" class="cut bub" transform="translate(24,40)"/>
    <text x="4" y="66" class="s">This is its "diving bell" — the</text>
    <text x="4" y="69.5" class="s">spider fills it with air and</text>
    <text x="4" y="73" class="s">breathes underwater. It sits</text>
    <text x="4" y="76.5" class="s">behind the body.</text>
  </g>
  <!-- r1c4 finished -->
  <g transform="translate(148.5,0)">
    <text x="4" y="9" class="t" font-size="4.2">Finished!</text><text x="4" y="13" class="s">the same pieces, assembled</text>
    <rect class="blue" x="4" y="24" width="42" height="56" rx="4" opacity="0.55"/>
    <g transform="translate(25,52)">
      <!-- legs (from cephalothorax) -->
      <g id="rlegs">
        <use href="#leg" class="dk cut" transform="translate(1,-7) rotate(-42) scale(0.55)"/>
        <use href="#leg" class="dk cut" transform="translate(1,-5) rotate(-14) scale(0.55)"/>
        <use href="#leg" class="dk cut" transform="translate(1,-3) rotate(14) scale(0.55)"/>
        <use href="#leg" class="dk cut" transform="translate(1,-1) rotate(44) scale(0.55)"/>
      </g>
      <use href="#rlegs" transform="scale(-1,1)"/>
      <!-- air bubble behind -->
      <use href="#bubble" class="bub cut" transform="translate(0,5) scale(0.6)"/>
      <!-- abdomen -->
      <use href="#abdomen" class="dk cut" transform="translate(0,5) scale(0.6)"/>
      <!-- cephalothorax -->
      <use href="#ceph" class="dk cut" transform="translate(0,-7) scale(0.6)"/>
    </g>
    <text x="24.75" y="86" text-anchor="middle" class="s">body on its air bubble · 8 legs out wide · ≈ 8 × 8 cm</text>
  </g>
  <!-- r1c5 real thing -->
  <g transform="translate(198,0)">
    <text x="4" y="9" class="t" font-size="4.2">The real thing</text>
    <image xlink:href="_thumb.jpg" href="_thumb.jpg" x="5" y="13" width="39.5" height="26" preserveAspectRatio="xMidYMid slice"/>
    <rect x="5" y="13" width="39.5" height="26" fill="none" stroke="#c8c2b2" stroke-width="0.4"/>
    <text x="4" y="47" class="b">Argyroneta aquatica —</text><text x="4" y="51" class="b">the Diving Bell Spider,</text><text x="4" y="55" class="b">Britain's water spider.</text>
    <text x="4" y="64" class="s">Photo © mark-sundown, CC-BY,</text><text x="4" y="67.5" class="s">via iNaturalist. Photographed at</text>
    <text x="4" y="71" class="s">Llanelli, Wales — the nearest</text><text x="4" y="74.5" class="s">CC record to Manchester.</text>
  </g>
  <!-- r1c6 facts -->
  <g transform="translate(247.5,0)">
    <text x="4" y="9" class="t" font-size="4.2">Did you know?</text>
    <text x="4" y="20" class="b">· The only spider that lives</text><text x="6" y="23.8" class="b">its whole life underwater.</text>
    <text x="4" y="33" class="b">· It spins a silk "bell" and</text><text x="6" y="36.8" class="b">fills it with air from above.</text>
    <text x="4" y="46" class="b">· It breathes the trapped air</text><text x="6" y="49.8" class="b">like a tiny aqualung.</text>
    <text x="4" y="59" class="b">· Britain's only underwater</text><text x="6" y="62.8" class="b">spider.</text>
    <text x="4" y="72" class="b">· It hunts water insects and</text><text x="6" y="75.8" class="b">tiny pond creatures.</text>
  </g>

  <!-- r2c1 how to make it -->
  <g transform="translate(0,105)">
    <text x="4" y="10" class="t" font-size="4.6">How to make it</text><text x="4" y="15" class="s">from your felt squares</text>
    <text x="5" y="28" class="n">1</text><text x="11" y="27.5" class="i">Trace each shape onto</text><text x="11" y="31.7" class="i">the right felt colour.</text>
    <text x="5" y="44" class="n">2</text><text x="11" y="43.5" class="i">Cut out all 11 pieces.</text>
    <text x="5" y="55" class="n">3</text><text x="11" y="54.5" class="i">Build it on the mat →</text>
    <text x="4" y="66" class="lbl">Felt squares you'll use:</text>
    <rect class="cut dk"  x="4" y="69" width="4.5" height="4.5" rx="0.9"/><text x="11" y="72.6" class="b">dark brown — body &amp; 8 legs</text>
    <rect class="cut bub" x="4" y="75" width="4.5" height="4.5" rx="0.9"/><text x="11" y="78.6" class="b">pale silver — air bubble</text>
    <text x="4" y="90" class="s">Blue pond mat/pouch is premade.</text>
  </g>
  <!-- r2c2 build it -->
  <g transform="translate(49.5,105)">
    <text x="4" y="10" class="t" font-size="4.6">Build it</text><text x="4" y="15" class="s">lay the pieces on the mat</text>
    <text x="5" y="28" class="n">1</text><text x="11" y="27.5" class="i">Lay the blue mat down</text><text x="11" y="31.7" class="i">— that's your pond.</text>
    <text x="5" y="44" class="n">2</text><text x="11" y="43.5" class="i">Place the pale air bubble</text><text x="11" y="47.7" class="i">— its diving bell.</text>
    <text x="5" y="60" class="n">3</text><text x="11" y="59.5" class="i">Round body at top, big</text><text x="11" y="63.7" class="i">abdomen on the bubble.</text>
    <text x="4" y="84" class="s">Nothing is fixed — the pieces</text><text x="4" y="87.5" class="s">just sit like a jigsaw.</text>
  </g>
  <!-- r2c3 and again -->
  <g transform="translate(99,105)">
    <text x="4" y="10" class="t" font-size="4.6">…and again</text><text x="4" y="15" class="s">it's a puzzle, not a glue-up</text>
    <text x="5" y="28" class="n">4</text><text x="11" y="27.5" class="i">Add 8 legs — 4 each</text><text x="11" y="31.7" class="i">side, spread out wide.</text>
    <text x="5" y="44" class="n">5</text><text x="11" y="43.5" class="i">Front legs forward,</text><text x="11" y="47.7" class="i">back legs backward.</text>
    <text x="5" y="60" class="n">6</text><text x="11" y="59.5" class="i">Done! Take it apart</text><text x="11" y="63.7" class="i">and build it all again.</text>
    <text x="4" y="84" class="s">Spiders have 8 legs — count</text><text x="4" y="87.5" class="s">them as you go!</text>
  </g>
  <!-- r2c4 at a glance -->
  <g transform="translate(148.5,105)">
    <text x="4" y="10" class="t" font-size="4.2">At a glance</text>
    <text x="4" y="20" class="lbl">11 felt pieces</text>
    <text x="6" y="27" class="b">· 1 abdomen (dark brown)</text>
    <text x="6" y="33" class="b">· 1 cephalothorax (dark brown)</text>
    <text x="6" y="39" class="b">· 8 legs (dark brown)</text>
    <text x="6" y="45" class="b">· 1 air bubble (pale silver)</text>
    <text x="4" y="56" class="lbl">Finished size</text><text x="6" y="63" class="b">≈ 8 × 8 cm</text>
    <text x="4" y="74" class="s">Theme: Aquatic. Collect the</text><text x="4" y="77.5" class="s">river skater, dragonfly and</text><text x="4" y="81" class="s">bell spider.</text>
  </g>
  <!-- r2c5 cover -->
  <g transform="translate(198,105)">
    <rect x="1.5" y="1.5" width="46.5" height="49.5" rx="3" fill="#ffffff" stroke="#d5dde2" stroke-width="0.5"/>
    <rect x="1.5" y="1.5" width="46.5" height="3" rx="1.5" fill="#3a6a8a"/>
    <image xlink:href="_giw-logo-t.png" href="_giw-logo-t.png" x="12" y="7" width="25.5" height="18.9" preserveAspectRatio="xMidYMid meet"/>
    <text x="24.75" y="31" text-anchor="middle" class="b" font-size="3.2">Make your own</text>
    <text x="24.75" y="38.5" text-anchor="middle" class="t" font-size="4.8">Bell Spider</text>
    <line x1="18" y1="41.5" x2="31.5" y2="41.5" stroke="#c4d0d6" stroke-width="0.5"/>
    <text x="24.75" y="47.5" text-anchor="middle" class="t" font-size="4.6" fill="#3a6a8a">Instructions</text>
    <text x="24.75" y="63" text-anchor="middle" class="b">A Giant Insect World felt puzzle</text>
    <text x="24.75" y="67.5" text-anchor="middle" class="s">build it · take it apart · build it again</text>
    <g transform="translate(24.75,84)">
      <g id="crlegs"><use href="#leg" class="dk" transform="translate(1,-4) rotate(-40) scale(0.3)"/><use href="#leg" class="dk" transform="translate(1,-2) rotate(-10) scale(0.3)"/><use href="#leg" class="dk" transform="translate(1,0) rotate(20) scale(0.3)"/></g>
      <use href="#crlegs" transform="scale(-1,1)"/>
      <ellipse class="bub" cx="0" cy="3" rx="7" ry="7.5"/>
      <ellipse class="dk" cx="0" cy="3" rx="5.5" ry="6"/>
      <ellipse class="dk" cx="0" cy="-5" rx="3.5" ry="3.5"/>
    </g>
  </g>
  <!-- r2c6 back -->
  <g transform="translate(247.5,105)">
    <text x="24.75" y="17" text-anchor="middle" class="t" font-size="7" fill="#3a6a8a">FuzzleWorld</text>
    <text x="24.75" y="22.5" text-anchor="middle" class="s">downloadable felt puzzle kits</text>
    <text x="24.75" y="39" text-anchor="middle" class="t" font-size="3.8">Collect the set</text>
    <text x="24.75" y="48" text-anchor="middle" class="b">Meadow · Aquatic · Underground</text>
    <text x="24.75" y="58" text-anchor="middle" class="s">river skater · dragonfly · bell spider</text>
    <text x="24.75" y="61.5" text-anchor="middle" class="s">butterfly · ladybird · more…</text>
    <text x="24.75" y="86" text-anchor="middle" class="s">Species: A. aquatica · Photo ©</text>
    <text x="24.75" y="89.5" text-anchor="middle" class="s">mark-sundown, CC-BY · Logo ©</text>
    <text x="24.75" y="93" text-anchor="middle" class="s">Giant Insect World</text>
  </g>

  <g stroke="#a6b3bb" stroke-width="0.5" fill="none">
    <line x1="49.5" y1="0" x2="49.5" y2="5"/><line x1="49.5" y1="205" x2="49.5" y2="210"/>
    <line x1="99" y1="0" x2="99" y2="5"/><line x1="99" y1="205" x2="99" y2="210"/>
    <line x1="148.5" y1="0" x2="148.5" y2="5"/><line x1="148.5" y1="205" x2="148.5" y2="210"/>
    <line x1="198" y1="0" x2="198" y2="5"/><line x1="198" y1="205" x2="198" y2="210"/>
    <line x1="247.5" y1="0" x2="247.5" y2="5"/><line x1="247.5" y1="205" x2="247.5" y2="210"/>
    <line x1="0" y1="105" x2="5" y2="105"/><line x1="292" y1="105" x2="297" y2="105"/>
  </g>
  <rect x="0.4" y="0.4" width="296.2" height="209.2" fill="none" stroke="#d7d7d7" stroke-width="0.4"/>
  <text x="4" y="208.4" class="s" fill="#b3b3b3" font-size="1.9">Print A4 landscape at 100% (actual size) · fold into 6 × 2 where the edge marks line up · cover = top half of row 2, column 5</text>
</svg>
