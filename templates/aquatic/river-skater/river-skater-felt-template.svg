<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="297mm" height="210mm" viewBox="0 0 297 210">
  <!--
    FuzzleWorld × Giant Insect World — River Skater felt puzzle ("fuzzle")
    A4 LANDSCAPE, folds into 6 columns x 2 rows = 12 panels. Cut pieces are ACTUAL SIZE (print at 100%) and may cross fold lines.
    You get felt SQUARES + this template; trace each shape onto felt and cut it out. Build on the premade blue mat, then rebuild.
    Cover (logo + title + Instructions) = TOP HALF of row 2, column 5.
    Fonts: headings Nunito (rounded, stand-in for Averta Rounded) · body Source Serif 4.
    Photo © Alfie Felton (Littleborough), CC0, via iNaturalist. Logo © Giant Insect World.
  -->
  <style>
    .t   { font-family:'Nunito ExtraBold', sans-serif; fill:#2b3a2b; }
    .n   { font-family:'Nunito ExtraBold', sans-serif; fill:#3a6a8a; font-size:4.2px; }
    .lbl { font-family:'Nunito ExtraBold', sans-serif; fill:#2b3a2b; font-size:2.9px; }
    .b   { font-family:'Source Serif 4', serif; fill:#333; font-size:2.8px; }
    .s   { font-family:'Source Serif 4', serif; fill:#666; font-size:2.3px; }
    .i   { font-family:'Source Serif 4', serif; fill:#2b2b2b; font-size:3.3px; }
    .cut { stroke:#1c1c1c; stroke-width:0.45; }
    .guide { stroke:#8a8a8a; stroke-width:0.3; stroke-dasharray:1.4 1; fill:none; }
    .tan { fill:#dbc79f; } .brown{ fill:#8a5a2e; } .gold{ fill:#bd8f52; }
    .maroon{ fill:#5e2c28; } .blue{ fill:#9cc0d6; }
  </style>
  <defs>
    <path id="underbody" d="M 0 -42.5 C 4.5 -42.5 7 -38.5 7 -30.5 C 7 -7.5 7 19.5 6 33.5 C 5 40.5 2.5 42.5 0 42.5 C -2.5 42.5 -5 40.5 -6 33.5 C -7 19.5 -7 -7.5 -7 -30.5 C -7 -38.5 -4.5 -42.5 0 -42.5 Z"/>
    <path id="back" d="M 0 -40 C 3.5 -40 5 -36 5 -29 C 5 -7 5 18 4 32 C 3.2 38 2 40 0 40 C -2 40 -3.2 38 -4 32 C -5 18 -5 -7 -5 -29 C -5 -36 -3.5 -40 0 -40 Z"/>
  </defs>

  <rect x="0" y="0" width="297" height="210" fill="#ffffff"/>

  <!-- ===================== ROW 1 — CUT PIECES (actual size) + finished + photo ===================== -->

  <!-- r1c1 : underbody -->
  <g transform="translate(0,0)">
    <text x="4" y="9" class="t" font-size="3.8">Underbody ×1</text>
    <text x="4" y="13" class="s">pale tan · cut 1 · actual size</text>
    <path class="cut tan" d="M 18 17 C 22.5 17 25 21 25 29 C 25 52 25 79 24 93 C 23 100 20.5 102 18 102 C 15.5 102 13 100 12 93 C 11 79 11 52 11 29 C 11 21 13.5 17 18 17 Z"/>
    <text x="30" y="58" class="s">the belly —</text>
    <text x="30" y="61.5" class="s">largest piece</text>
  </g>

  <!-- r1c2 : back -->
  <g transform="translate(49.5,0)">
    <text x="4" y="9" class="t" font-size="3.8">Back ×1</text>
    <text x="4" y="13" class="s">mid brown · cut 1 · actual size</text>
    <path class="cut brown" d="M 17 17 C 20.5 17 22 21 22 28 C 22 50 22 75 21 89 C 20.2 95 19 97 17 97 C 15 97 13.8 95 13 89 C 12 75 12 50 12 28 C 12 21 13.5 17 17 17 Z"/>
    <line class="guide" x1="17" y1="23" x2="17" y2="91"/>
    <text x="27" y="54" class="s">sits on top of</text>
    <text x="27" y="57.5" class="s">the underbody</text>
    <text x="27" y="64" class="s">dashed = centre</text>
    <text x="27" y="67.5" class="s">guide (don't cut)</text>
  </g>

  <!-- r1c3 : head + eyes + antennae -->
  <g transform="translate(99,0)">
    <text x="4" y="9" class="t" font-size="3.8">Head, eyes,</text>
    <text x="4" y="13.8" class="t" font-size="3.8">antennae</text>
    <ellipse class="cut gold" cx="15" cy="26" rx="7" ry="5.5"/>
    <text x="25" y="25" class="s">head ×1</text><text x="25" y="28.5" class="s">golden tan</text>
    <circle class="cut maroon" cx="11" cy="42" r="3"/>
    <circle class="cut maroon" cx="20" cy="42" r="3"/>
    <text x="25" y="41" class="s">eyes ×2</text><text x="25" y="44.5" class="s">dark maroon</text>
    <path class="cut maroon" d="M 9 54 L 11 54 L 10.5 84 L 9.5 84 Z"/>
    <path class="cut maroon" d="M 17 54 L 19 54 L 18.5 84 L 17.5 84 Z"/>
    <text x="25" y="64" class="s">antennae ×2</text>
    <text x="25" y="67.5" class="s">dark maroon</text>
    <text x="25" y="71" class="s">cut 2 separate</text>
    <text x="25" y="74.5" class="s">strips</text>
  </g>

  <!-- r1c4 : legs ×6 -->
  <g transform="translate(148.5,0)">
    <text x="4" y="9" class="t" font-size="3.8">Legs ×6</text>
    <text x="4" y="13" class="s">mid brown · actual size</text>
    <path class="cut brown" d="M 5.8 18 L 8.2 18 L 7.6 58 L 6.4 58 Z"/>
    <path class="cut brown" d="M 11.8 18 L 14.2 18 L 13.6 58 L 12.4 58 Z"/>
    <path class="cut brown" d="M 18.8 18 L 21.2 18 L 20.6 102 L 19.4 102 Z"/>
    <path class="cut brown" d="M 24.8 18 L 27.2 18 L 26.6 102 L 25.4 102 Z"/>
    <path class="cut brown" d="M 31.8 18 L 34.2 18 L 33.6 94 L 32.4 94 Z"/>
    <path class="cut brown" d="M 37.8 18 L 40.2 18 L 39.6 94 L 38.4 94 Z"/>
    <text x="4" y="103" class="s">2 front · 2 middle (longest) · 2 hind</text>
  </g>

  <!-- r1c5 : finished -->
  <g transform="translate(198,0)">
    <text x="4" y="9" class="t" font-size="4.2">Finished!</text>
    <text x="4" y="13" class="s">your River Skater on the mat</text>
    <rect class="blue" x="6" y="28" width="38" height="46" rx="4" opacity="0.55"/>
    <g stroke="#8a5a2e" stroke-width="0.7" stroke-linecap="round" fill="none">
      <path d="M20 49 C 16 43 13 39 10 35"/><path d="M20 53 C 16 59 13 63 10 67"/>
      <path d="M25 49 C 19 41 13 36 8 31"/><path d="M25 53 C 21 62 18 67 14 72"/>
      <path d="M30 49 C 38 43 42 39 45 35"/><path d="M30 53 C 38 60 42 64 45 69"/>
    </g>
    <use href="#underbody" class="tan cut" transform="translate(26,51) rotate(90) scale(0.5)"/>
    <use href="#back" class="brown cut" transform="translate(27,51) rotate(90) scale(0.5)"/>
    <ellipse class="gold"  cx="12" cy="51" rx="3.4" ry="2.6"/>
    <circle class="maroon" cx="10" cy="49.6" r="1.1"/><circle class="maroon" cx="10" cy="52.4" r="1.1"/>
    <path d="M9 49.4 C 6 47 5 46 3.5 44.6" stroke="#5e2c28" stroke-width="0.6" fill="none"/>
    <path d="M9 52.6 C 6 55 5 56 3.5 57.4" stroke="#5e2c28" stroke-width="0.6" fill="none"/>
    <text x="24.75" y="82" text-anchor="middle" class="s">slender body, legs splayed wide</text>
    <text x="24.75" y="85.5" text-anchor="middle" class="s">middle pair the longest · ≈ 11 × 9 cm</text>
  </g>

  <!-- r1c6 : the real thing -->
  <g transform="translate(247.5,0)">
    <text x="4" y="9" class="t" font-size="4.2">The real thing</text>
    <image xlink:href="_thumb.jpg" href="_thumb.jpg" x="5" y="13" width="39.5" height="26" preserveAspectRatio="xMidYMid slice"/>
    <rect x="5" y="13" width="39.5" height="26" fill="none" stroke="#c8c2b2" stroke-width="0.4"/>
    <text x="4" y="47" class="b">Aquarius najas — the River</text>
    <text x="4" y="51" class="b">Skater, one of Britain's</text>
    <text x="4" y="55" class="b">larger pond skaters.</text>
    <text x="4" y="64" class="s">Photo © Alfie Felton, CC0, via</text>
    <text x="4" y="67.5" class="s">iNaturalist. Spotted at</text>
    <text x="4" y="71" class="s">Littleborough — about 20 km</text>
    <text x="4" y="74.5" class="s">from Manchester.</text>
  </g>

  <!-- ===================== ROW 2 — how to, build, facts, cover, back ===================== -->

  <!-- r2c1 : how to make it -->
  <g transform="translate(0,105)">
    <text x="4" y="10" class="t" font-size="4.6">How to make it</text>
    <text x="4" y="14.5" class="s">from your felt squares</text>
    <text x="4" y="25" class="n">1</text><text x="10" y="25" class="i">Trace each shape onto</text><text x="10" y="29.2" class="i">the right felt colour.</text>
    <text x="4" y="39" class="n">2</text><text x="10" y="39" class="i">Cut out all 13 pieces.</text>
    <text x="4" y="49" class="n">3</text><text x="10" y="49" class="i">Build it on the mat →</text>
    <text x="4" y="60" class="lbl">Felt squares you'll use:</text>
    <rect class="cut tan"    x="4" y="63" width="4.5" height="4.5" rx="0.9"/><text x="11" y="66.6" class="b">pale tan — underbody</text>
    <rect class="cut brown"  x="4" y="69.5" width="4.5" height="4.5" rx="0.9"/><text x="11" y="73.1" class="b">mid brown — back &amp; legs</text>
    <rect class="cut gold"   x="4" y="76" width="4.5" height="4.5" rx="0.9"/><text x="11" y="79.6" class="b">golden tan — head</text>
    <rect class="cut maroon" x="4" y="82.5" width="4.5" height="4.5" rx="0.9"/><text x="11" y="86.1" class="b">dark maroon — eyes/antennae</text>
    <text x="4" y="94" class="s">Blue mat/pouch comes premade.</text>
  </g>

  <!-- r2c2 : build it (1-3) -->
  <g transform="translate(49.5,105)">
    <text x="4" y="10" class="t" font-size="4.6">Build it</text>
    <text x="4" y="14.5" class="s">lay the pieces on the mat</text>
    <text x="4" y="27" class="n">1</text><text x="10" y="27" class="i">Lay the blue mat down</text><text x="10" y="31.2" class="i">— that's your pond.</text>
    <text x="4" y="43" class="n">2</text><text x="10" y="43" class="i">Place the underbody,</text><text x="10" y="47.2" class="i">then the back on top.</text>
    <text x="4" y="59" class="n">3</text><text x="10" y="59" class="i">Add the golden head</text><text x="10" y="63.2" class="i">at the front.</text>
    <text x="4" y="80" class="s">Nothing is fixed — the pieces</text>
    <text x="4" y="83.5" class="s">just sit like a jigsaw.</text>
  </g>

  <!-- r2c3 : …and again (4-6) -->
  <g transform="translate(99,105)">
    <text x="4" y="10" class="t" font-size="4.6">…and again</text>
    <text x="4" y="14.5" class="s">it's a puzzle, not a glue-up</text>
    <text x="4" y="27" class="n">4</text><text x="10" y="27" class="i">Pop on the 2 eyes and</text><text x="10" y="31.2" class="i">the 2 antennae.</text>
    <text x="4" y="43" class="n">5</text><text x="10" y="43" class="i">Tuck the 6 legs under:</text><text x="10" y="47.2" class="i">short pair to the front,</text><text x="10" y="51.4" class="i">long pairs out wide.</text>
    <text x="4" y="63" class="n">6</text><text x="10" y="63" class="i">Done! Take it apart</text><text x="10" y="67.2" class="i">and build it all again.</text>
    <text x="4" y="84" class="s">Want it fixed one day? A dab of</text>
    <text x="4" y="87.5" class="s">glue works — but it's made to rebuild.</text>
  </g>

  <!-- r2c4 : did you know -->
  <g transform="translate(148.5,105)">
    <text x="4" y="10" class="t" font-size="4.2">Did you know?</text>
    <text x="4" y="21" class="b">· It skates on the surface</text>
    <text x="6" y="24.8" class="b">film of ponds and slow rivers.</text>
    <text x="4" y="34" class="b">· Water-repellent leg hairs</text>
    <text x="6" y="37.8" class="b">trap air, so it never sinks.</text>
    <text x="4" y="47" class="b">· It feels ripples in the water</text>
    <text x="6" y="50.8" class="b">to find trapped insects to eat.</text>
    <text x="4" y="60" class="b">· The long middle legs row;</text>
    <text x="6" y="63.8" class="b">the back legs steer.</text>
    <text x="4" y="73" class="b">· One of Britain's largest</text>
    <text x="6" y="76.8" class="b">pond skaters.</text>
  </g>

  <!-- r2c5 : cover -->
  <g transform="translate(198,105)">
    <rect x="1.5" y="1.5" width="46.5" height="49.5" rx="3" fill="#ffffff" stroke="#d5dde2" stroke-width="0.5"/>
    <rect x="1.5" y="1.5" width="46.5" height="3" rx="1.5" fill="#3a6a8a"/>
    <image xlink:href="_giw-logo-t.png" href="_giw-logo-t.png" x="12" y="7" width="25.5" height="18.9" preserveAspectRatio="xMidYMid meet"/>
    <text x="24.75" y="31" text-anchor="middle" class="b" font-size="3.2">Make your own</text>
    <text x="24.75" y="38.5" text-anchor="middle" class="t" font-size="5.6">River Skater</text>
    <line x1="18" y1="41.5" x2="31.5" y2="41.5" stroke="#c4d0d6" stroke-width="0.5"/>
    <text x="24.75" y="47.5" text-anchor="middle" class="t" font-size="4.6" fill="#3a6a8a">Instructions</text>
    <text x="24.75" y="63" text-anchor="middle" class="b">A Giant Insect World felt puzzle</text>
    <text x="24.75" y="67.5" text-anchor="middle" class="s">build it · take it apart · build it again</text>
    <g transform="translate(24.75,86)">
      <g stroke="#8a5a2e" stroke-width="0.6" stroke-linecap="round" fill="none">
        <path d="M-4 -1 C -7 -5 -9 -8 -11 -11"/><path d="M-4 2 C -7 6 -9 9 -11 12"/>
        <path d="M0 -1 C -5 -6 -9 -10 -13 -14"/><path d="M0 2 C -3 8 -6 12 -9 16"/>
        <path d="M4 -1 C 10 -6 13 -9 16 -13"/><path d="M4 2 C 10 7 13 11 16 15"/>
      </g>
      <ellipse class="tan" cx="1" cy="0.5" rx="12" ry="2.6"/>
      <ellipse class="brown" cx="2.5" cy="0.5" rx="9" ry="3"/>
      <ellipse class="gold" cx="-10" cy="0.5" rx="2.6" ry="2"/>
    </g>
  </g>

  <!-- r2c6 : back / collect -->
  <g transform="translate(247.5,105)">
    <text x="24.75" y="17" text-anchor="middle" class="t" font-size="7" fill="#3a6a8a">FuzzleWorld</text>
    <text x="24.75" y="22.5" text-anchor="middle" class="s">downloadable felt puzzle kits</text>
    <text x="24.75" y="39" text-anchor="middle" class="t" font-size="3.8">Collect the set</text>
    <text x="24.75" y="48" text-anchor="middle" class="b">Meadow · Aquatic · Underground</text>
    <text x="24.75" y="58" text-anchor="middle" class="s">river skater · dragonfly · bell spider</text>
    <text x="24.75" y="61.5" text-anchor="middle" class="s">butterfly · ladybird · more…</text>
    <text x="24.75" y="86" text-anchor="middle" class="s">Species: Aquarius najas · Photo</text>
    <text x="24.75" y="89.5" text-anchor="middle" class="s">© Alfie Felton, CC0 · Logo ©</text>
    <text x="24.75" y="93" text-anchor="middle" class="s">Giant Insect World</text>
  </g>

  <!-- ===================== FOLD GRID + trim + note ===================== -->
  <g stroke="#a6b3bb" stroke-width="0.5" fill="none">
    <line x1="49.5" y1="0" x2="49.5" y2="5"/><line x1="49.5" y1="205" x2="49.5" y2="210"/>
    <line x1="99" y1="0" x2="99" y2="5"/><line x1="99" y1="205" x2="99" y2="210"/>
    <line x1="148.5" y1="0" x2="148.5" y2="5"/><line x1="148.5" y1="205" x2="148.5" y2="210"/>
    <line x1="198" y1="0" x2="198" y2="5"/><line x1="198" y1="205" x2="198" y2="210"/>
    <line x1="247.5" y1="0" x2="247.5" y2="5"/><line x1="247.5" y1="205" x2="247.5" y2="210"/>
    <line x1="0" y1="105" x2="5" y2="105"/><line x1="292" y1="105" x2="297" y2="105"/>
  </g>
  <rect x="0.4" y="0.4" width="296.2" height="209.2" fill="none" stroke="#d7d7d7" stroke-width="0.4"/>
  <text x="4" y="208.4" class="s" fill="#b3b3b3" font-size="1.9">Print A4 landscape at 100% (actual size) · fold into 6 × 2 where the edge marks line up · cover = top half of row 2, column 5</text>
</svg>
